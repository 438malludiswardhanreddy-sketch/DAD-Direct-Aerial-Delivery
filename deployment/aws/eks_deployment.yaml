apiVersion: apps/v1
kind: Deployment
metadata:
  name: dad-backend-eks
  namespace: dad-delivery
  labels:
    app: dad-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dad-backend
  template:
    metadata:
      labels:
        app: dad-backend
    spec:
      containers:
      - name: dad-backend
        image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/dad-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: dad-secrets
              key: database-url
        - name: MQTT_BROKER_HOST
          value: "dad-mqtt-service.dad-delivery.svc.cluster.local"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dad-backend-service
  namespace: dad-delivery
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: dad-backend
